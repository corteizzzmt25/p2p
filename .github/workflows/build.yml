name: Build BitChat Mobile (APK & IPA)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
        
      - name: Setup Capacitor Android
        run: |
          # Clean build: removes existing android/ folder if any and adds it fresh
          rm -rf android
          npx cap add android
          npx cap sync android
          
      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BitChat-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Setup Capacitor iOS
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          
      - name: Build iOS (Xcode)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          
      - name: Zip iOS App
        run: |
          # Robust search for the .app file
          find ios/App/build -name "*.app" -exec zip -r BitChat.app.zip {} +
          mv BitChat.app.zip ios/App/BitChat.app.zip
          
      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BitChat-iOS-App
          path: ios/App/BitChat.app.zip
